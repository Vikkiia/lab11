<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Лабораторная работа 11 | GitHub Actions CI/CD</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="intro" aria-labelledby="page-title">
        <div class="pipeline-badge" aria-label="GitHub Actions pipeline">
          <span>Checkout</span>
          <span>Test</span>
          <span>Build</span>
          <span>Deploy</span>
        </div>
        <p class="eyebrow">Лабораторная работа 11</p>
        <h1 id="page-title">Заявка на настройку CI/CD</h1>
        <p class="lead">Форма для обращения к команде автоматизации GitHub Actions.</p>
      </section>

      <section class="form-panel" aria-label="Форма заявки">
        <form id="feedback-form" novalidate>
          <div class="field">
            <label for="name">Имя</label>
            <input id="name" name="name" type="text" autocomplete="name" placeholder="Иван Иванов">
            <p class="error" id="name-error" aria-live="polite"></p>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="ivan@example.com">
            <p class="error" id="email-error" aria-live="polite"></p>
          </div>

          <div class="field">
            <label for="topic">Тема</label>
            <select id="topic" name="topic">
              <option value="">Выберите тему</option>
              <option value="testing">Автоматизированное тестирование</option>
              <option value="build">Сборка приложения</option>
              <option value="deploy">Публикация артефакта</option>
            </select>
            <p class="error" id="topic-error" aria-live="polite"></p>
          </div>

          <div class="field">
            <label for="message">Описание</label>
            <textarea id="message" name="message" rows="5" placeholder="Кратко опишите задачу"></textarea>
            <p class="error" id="message-error" aria-live="polite"></p>
          </div>

          <label class="checkbox">
            <input id="consent" name="consent" type="checkbox">
            <span>Согласен на обработку заявки</span>
          </label>
          <p class="error" id="consent-error" aria-live="polite"></p>

          <button type="submit">Отправить заявку</button>
          <p class="status" id="form-status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="formLogic.js"></script>
    <script src="app.js"></script>
  </body>
</html>
